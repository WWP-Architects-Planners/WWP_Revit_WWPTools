name: Publish pyRevit Branch

on:
  push:
    branches:
      - main
    paths:
      - "WWPTools.extension/**"
      - "WWPTools.WpfUI/**"
      - ".github/workflows/publish-pyrevit-branch.yml"
      - "installer/Publish-PyRevitBranch.ps1"
      - "installer/Test-PyRevitPublishInputs.ps1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publish inputs
        shell: pwsh
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          ./installer/Test-PyRevitPublishInputs.ps1 -BaseRef $env:BASE_REF -HeadRef $env:HEAD_REF

      - name: Publish WWPTools.extension subtree to pyrevit branch
        shell: pwsh
        run: |
          ./installer/Publish-PyRevitBranch.ps1 -SourceRef HEAD -TargetBranch pyrevit -ExtensionPath WWPTools.extension -Remote origin
