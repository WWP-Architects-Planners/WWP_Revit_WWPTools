name: Sign MSI (SignPath)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "WWPTools version to sign (example: 1.9.1)"
        required: true
        default: "1.9.1"
      sign_packages_msi:
        description: "Also sign WWPTools-Packages MSI"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  build-and-sign:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installers
        shell: pwsh
        run: |
          ./installer/Build_WWPTools_MSI.ps1

      - name: Verify unsigned artifacts exist
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $main = Join-Path $PWD "installer/WWPTools-v$version.msi"
          if (-not (Test-Path -LiteralPath $main)) {
            throw "Missing installer artifact: $main"
          }
          if ("${{ inputs.sign_packages_msi }}" -eq "true") {
            $pkg = Join-Path $PWD "installer/WWPTools-Packages-v1.0.0.msi"
            if (-not (Test-Path -LiteralPath $pkg)) {
              throw "Missing packages artifact: $pkg"
            }
          }

      - name: Upload unsigned WWPTools MSI
        id: upload_unsigned_main
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-wwptools-msi
          path: installer/WWPTools-v${{ inputs.version }}.msi

      - name: Submit SignPath request (WWPTools MSI)
        id: sign_main
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_MAIN }}
          github-artifact-id: ${{ steps.upload_unsigned_main.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-main

      - name: Upload signed WWPTools MSI
        uses: actions/upload-artifact@v4
        with:
          name: signed-wwptools-msi
          path: signed-main/**

      - name: Upload unsigned WWPTools-Packages MSI
        if: ${{ inputs.sign_packages_msi }}
        id: upload_unsigned_packages
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-wwptools-packages-msi
          path: installer/WWPTools-Packages-v1.0.0.msi

      - name: Submit SignPath request (WWPTools-Packages MSI)
        if: ${{ inputs.sign_packages_msi }}
        id: sign_packages
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_PACKAGES }}
          github-artifact-id: ${{ steps.upload_unsigned_packages.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-packages

      - name: Upload signed WWPTools-Packages MSI
        if: ${{ inputs.sign_packages_msi }}
        uses: actions/upload-artifact@v4
        with:
          name: signed-wwptools-packages-msi
          path: signed-packages/**
