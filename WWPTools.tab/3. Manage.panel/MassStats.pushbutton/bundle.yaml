title: "Mass Stats\nTool"
tooltip: |
  Live back-of-house calculations from Revit mass floor areas.

  Requires a key schedule named "House Mix Key Schedule" with columns:
    Key Name     — house style code (e.g. BTR-1B2P)
    Mix Rate     — percentage of GIA for that style (e.g. 25%)
    Mass ID      — building identifier value (matches selected param)
    ! P_MASS_TypicalArea — typical unit area in sqm

  Project Information must have a parameter "! P_GIA_Ratio" (GIA/GEA ratio).

  Calculates per building block:
    • GEA = sum of mass floor areas  ·  GIA = GEA × ratio
    • Unit mix (Studio / 1-Bed / 2-Bed / 3-Bed / 4+Bed) and NSA
    • Bikes — Josta 80% / Sheffield 15% / Oversize 5%  (1 per bedroom)
    • Bins — Recycling / Residual / Food  (GLA / London Plan 2021)
    • Plants (units × 1.5 sqm)  ·  Cars (units × 0.13)
    • Total Back-of-House area = Bikes + Bins + Plants

  Select the building identifier parameter from the dropdown.
  The window is modeless — click Refresh after editing the model.
author: "Jason Tian"
